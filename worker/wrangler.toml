name = "bratan-music-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Cron triggers — cf executes runScheduledJobs() on this schedule.
# 04:30 UTC nightly: recompute taste vectors + regenerate daily playlists.
# Spread one execution window per day so all users' "Плейлист дня"
# rotates simultaneously and feels like a fresh batch in the morning.
[triggers]
crons = ["30 4 * * *"]

[vars]
ENVIRONMENT = "production"
APP_URL = "https://bratan-corp.github.io/bratan-music/"
# Brevo transactional sender (email-OTP login). The API key itself is
# a secret — set via `wrangler secret put BREVO_API_KEY`. Sender
# email must be a verified single-sender or sit on a verified domain
# in Brevo, otherwise the API returns 401.
BREVO_SENDER_EMAIL = "noreply.bratanmusic@gmail.com"
BREVO_SENDER_NAME = "BRATAN MUSIC"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "bratan-music-db"
database_id = "af567808-4d71-4248-89f0-4681371dc771"
# `wrangler d1 migrations apply` reads .sql files from this directory
# in lexicographic order. The CI workflow `.github/workflows/apply-d1-migrations.yml`
# runs this automatically when migration files change on `main`.
migrations_dir = "src/db/migrations"

# KV Namespace
[[kv_namespaces]]
binding = "SESSIONS"
id = "2f2ca120b5104617a262332524b27190"

# R2 Bucket
[[r2_buckets]]
binding = "TRACKS"
bucket_name = "bratanmusic-tracks"

# Durable Object: per-room WebSocket broadcast hub.
# Persists nothing of its own — D1 remains the source of truth for
# chat rows. The DO just fans new messages out to subscribed sockets
# so receivers don't have to wait for the polling tick.
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoomDO"

# CF Workers requires class migrations for every new DO class. The tag
# is opaque to us — wrangler tracks which migrations were applied to a
# given script. Keep this list append-only.
#
# `new_sqlite_classes` is the SQLite-backed DO storage backend.
# We don't actually use storage on `ChatRoomDO` (the broadcast hub is
# stateless beyond an in-memory `Set<WebSocket>`), but Cloudflare
# requires this variant on the Workers Free plan — the older
# `new_classes` form provisions a KV-backed namespace which is paid-
# tier only and the API rejects the deploy with code 10097. SQLite-
# backed DOs are forward-compatible with the paid plan, so this same
# config works whether or not the project moves to a paid tier.
[[migrations]]
tag = "v1-chat-room-do"
new_sqlite_classes = ["ChatRoomDO"]

# Secrets (задаются через wrangler secret put):
# TIDAL_CLIENT_ID
# TIDAL_CLIENT_SECRET
# TIDAL_SESSION_TOKEN
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# JWT_SECRET
# JWT_REFRESH_SECRET
# SESSION_ENCRYPTION_KEY
# YANDEX_API_TOKEN
# YANDEX_FOLDER_ID
# YANDEX_MODEL_URI (опционально, по умолчанию gpt://<folder>/gpt-oss-120b/latest)
