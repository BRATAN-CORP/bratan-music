name: Apply D1 Migrations

# Manual one-click trigger: GitHub → Actions → "Apply D1 Migrations" → Run workflow.
# Bootstraps the `d1_migrations` tracking table if it's missing, marks
# the historical migrations 0001–0008 as already applied (those were
# run manually before this workflow existed), then applies any new
# migration files via wrangler's built-in tracking. Re-running is
# safe — already-applied migrations are skipped.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worker/src/db/migrations/**'

jobs:
  apply:
    name: Apply migrations to remote D1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install deps
        working-directory: worker
        run: npm ci

      - name: Bootstrap d1_migrations table
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute bratan-music-db --remote --command="CREATE TABLE IF NOT EXISTS d1_migrations (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT UNIQUE, applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP NOT NULL); INSERT OR IGNORE INTO d1_migrations (name) VALUES ('0001_init.sql'),('0002_track_snapshot.sql'),('0003_auth_nonces.sql'),('0004_playlist_cover.sql'),('0005_tidal_session.sql'),('0006_playlist_pinned.sql'),('0007_user_tracks.sql'),('0008_library_items.sql');"

      - name: Apply pending migrations
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply bratan-music-db --remote
