name: Deploy to Self-Hosted Server

on:
  push:
    branches: [main]

concurrency:
  group: deploy-selfhosted
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://bratan-music.eu.cc/api

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            PROJECT=/opt/bratan-music
            cd $PROJECT/app
            git fetch origin main
            git reset --hard origin/main
            
            # Build frontend on server
            npm ci --production=false
            VITE_API_URL=https://bratan-music.eu.cc/api npx vite build --base=/
            rm -rf $PROJECT/deploy/nginx/html
            cp -r dist $PROJECT/deploy/nginx/html
            
            # Rebuild & restart API
            cd $PROJECT/deploy
            docker compose build api
            docker compose up -d api
            docker compose restart nginx
            
            echo "Deploy complete at $(date)"
