name: Deploy to Self-Hosted Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-selfhosted
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/bratan-corp/bratan-music-api
  WEB_IMAGE: ghcr.io/bratan-corp/bratan-music-web

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image ──
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend (nginx + built SPA) ──
      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://bratan-music.eu.cc/api
            VITE_BASE=/
          cache-from: type=gha
          cache-to: type=gha,mode=max
