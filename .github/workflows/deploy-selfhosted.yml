name: Deploy to Self-Hosted Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_setup:
        description: 'Run full server setup (first deploy)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-selfhosted
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/bratan-corp/bratan-music-api
  WEB_IMAGE: ghcr.io/bratan-corp/bratan-music-web

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://bratan-music.eu.cc/api
            VITE_BASE=/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy
        run: |
          ssh deploy-server << 'DEPLOY'
            set -e
            cd /opt/bratan-music

            # Update repo
            cd app && git fetch origin && git reset --hard origin/main && cd ..

            # Sync deploy configs from repo
            cp app/deploy/docker-compose.yml deploy/docker-compose.yml
            cp -r app/deploy/nginx deploy/
            cp -r app/deploy/backup-tg deploy/

            # Log in to GHCR and pull new images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null
            cd deploy
            docker compose pull api nginx

            # Restart services
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            # Health check (wait for API)
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/api/health | grep -q '"ok"'; then
                echo "✅ Deploy successful — API healthy"
                exit 0
              fi
              sleep 2
            done
            echo "❌ API health check failed!"
            docker compose logs api --tail 30
            exit 1
          DEPLOY

  # ── First-time server setup (manual trigger only) ──
  setup:
    name: Initial Server Setup
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.full_setup == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Setup server
        run: |
          ssh deploy-server << 'SETUP'
            set -e

            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi

            if ! docker compose version &>/dev/null; then
              apt-get update -qq && apt-get install -y docker-compose-plugin
            fi

            echo "Docker: $(docker --version)"
            echo "Compose: $(docker compose version)"

            # Clone repo
            mkdir -p /opt/bratan-music
            if [ ! -d /opt/bratan-music/app/.git ]; then
              git clone --depth 1 -b main https://github.com/BRATAN-CORP/bratan-music.git /opt/bratan-music/app
            else
              cd /opt/bratan-music/app && git fetch origin && git reset --hard origin/main
            fi

            # Copy deploy configs
            mkdir -p /opt/bratan-music/deploy/nginx
            cp /opt/bratan-music/app/deploy/docker-compose.yml /opt/bratan-music/deploy/docker-compose.yml
            cp -r /opt/bratan-music/app/deploy/nginx/conf.d /opt/bratan-music/deploy/nginx/conf.d

            # Check .env exists
            if [ ! -f /opt/bratan-music/deploy/.env ]; then
              echo "⚠️  No .env file! Copy deploy/.env.example to /opt/bratan-music/deploy/.env and fill in secrets."
              exit 1
            fi

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull and start
            cd /opt/bratan-music/deploy
            docker compose pull
            docker compose up -d

            # Wait for services
            echo "Waiting for services..."
            sleep 15

            # Create MinIO bucket if needed
            docker compose exec -T minio mc alias set local http://localhost:9000 \
              $(grep MINIO_ACCESS_KEY /opt/bratan-music/deploy/.env | cut -d= -f2) \
              $(grep MINIO_SECRET_KEY /opt/bratan-music/deploy/.env | cut -d= -f2) 2>/dev/null
            docker compose exec -T minio mc mb --ignore-existing local/tracks

            # Health check
            if curl -sf http://localhost/api/health | grep -q '"ok"'; then
              echo "✅ Initial setup complete — API healthy"
            else
              echo "❌ API health check failed"
              docker compose logs api --tail 20
              exit 1
            fi
          SETUP
