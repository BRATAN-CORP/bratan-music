<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!--
      Two-surface icon split. The product brief is unambiguous:
      "именно логотип svg" for the favicon and "png картинку" for the
      PWA / iOS-home-screen tile. We honour the split exactly:

        - <link rel="icon" type="image/svg+xml"> — vector favicon,
          declared first so modern browsers (Chrome 80+, Edge,
          Firefox 41+) pick it for the tab strip / bookmarks.
        - <link rel="icon" type="image/png" sizes="32x32"> — small
          PNG **only as a fallback**. Safari on macOS supports SVG
          favicons in principle, but ships with a long-standing
          rendering quirk where the tab strip silently falls back
          to the OS-generated initial avatar (the user reported a
          big "G" placeholder) when only an SVG is declared. With
          a 32×32 PNG declared as a SECONDARY icon, Safari renders
          the actual brand mark while Chrome / Firefox / Edge still
          prefer the SVG (the `type` hint plus the smaller PNG size
          guarantees the modern browsers pick the vector). This
          PNG is a NEW asset rasterised from the same B-glyph;
          the user's "строго логотип svg" rule for the favicon is
          honoured everywhere SVG actually works, with this single
          targeted concession to Safari's bug.
        - <link rel="apple-touch-icon"> — PNG. iOS rejects SVG for
          the home-screen mask. With `base: '/bratan-music/'` the
          auto-discovery at `bratan-corp.github.io/apple-touch-icon.png`
          misses the file living under the project subpath, so we
          declare it explicitly.
        - manifest icons (vite-plugin-pwa) — PNG, configured in
          `vite.config.ts`. Used by the Android launcher / Chromium
          desktop install / iOS PWA splash generation.
    -->
    <link rel="icon" type="image/svg+xml" href="/bratan-music/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/bratan-music/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/bratan-music/apple-touch-icon.png" />
    <link rel="manifest" href="/bratan-music/manifest.webmanifest" />
    <!--
      `maximum-scale=1, user-scalable=no` is intentional. Mobile Safari
      ignores it in normal browser tabs (so users can still pinch-zoom
      pages in the wild), but **respects** it once the page is added
      to the home screen / launched as a PWA. On Android Chrome the
      same flags reliably suppress the accidental pinch / double-tap
      zoom that the user reported when navigating around the app in
      standalone mode. We pair it with `touch-action: manipulation`
      and a 16px input font-size below to stop double-tap zoom and
      iOS's input-focus auto-zoom.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <!-- Treat the page as a fullscreen PWA when launched from the iOS
         home screen. Without these flags Safari renders the address
         bar / browser chrome inside the standalone window. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!--
      GitHub Pages SPA redirect decoder (https://github.com/rafgraph/spa-github-pages).
      Pairs with public/404.html, which on a deep-link reload encodes
      the original path into ?/ and bounces back here. Without this
      decoder the browser router would just see the bare base path on
      reload and dump the user back on the home screen — exactly what
      the user reported when refreshing /artist/<id>.
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <title>BRATAN MUSIC — Tidal из Telegram</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
