# ── Origin server behind Cloudflare Tunnel ───────────────
# CF Tunnel terminates SSL and forwards plain HTTP to port 80.
# No local SSL needed.

server {
    listen 80;
    server_name bratan-music.eu.cc;

    # Max upload size (for audio file uploads)
    client_max_body_size 50m;

    # ── Audio proxy: Tidal CDN passthrough (API-generated URLs, no /api/) ──
    # The API returns URLs like /tracks/audio?url=<tidal-cdn>&... which the
    # <audio> element fetches directly. Must forward Range headers for seeking.
    location /tracks/audio {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Override stream: R2/MinIO audio (API-generated URLs, no /api/) ──
    location ~ ^/tracks/[^/]+/override/stream {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Webhook (Telegram) — no /api prefix needed ──
    location /webhook/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── WebSocket for listening rooms ──
    # Must be BEFORE the generic /api/ block so WS upgrade is handled here
    location ~ ^/api/rooms/[^/]+/chat/ws {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API proxy: all /api/* requests stripped and forwarded ──
    # Covers: auth, user, search, tracks, covers, albums, artists,
    # playlists, library, uploads, admin, explore, recommendations,
    # daily-playlists, history, rooms, ai/playlists, health
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        # Disable buffering for streaming responses (uploads, overrides)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Frontend SPA (Vite build output) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — aggressive caching (hashed filenames) ──
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
