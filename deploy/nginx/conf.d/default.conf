# ── HTTP → HTTPS redirect + ACME challenge ──────────────
server {
    listen 80;
    server_name bratan-music.eu.cc;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name bratan-music.eu.cc;

    ssl_certificate /etc/letsencrypt/live/bratan-music.eu.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bratan-music.eu.cc/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (for audio file uploads)
    client_max_body_size 50m;

    # API proxy
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # For CF-Connecting-IP compatibility (rate limiter reads it)
        proxy_set_header CF-Connecting-IP $remote_addr;
    }

    # WebSocket for listening rooms
    location /api/rooms/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Webhook (Telegram) — no /api prefix rewrite needed
    location /webhook/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $remote_addr;
    }

    # Frontend SPA (Vite build output)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Static assets — aggressive caching (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
