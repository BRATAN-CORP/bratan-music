# ── Origin server behind Cloudflare Tunnel ───────────────
# CF Tunnel terminates SSL and forwards plain HTTP to port 80.
# No local SSL needed.

server {
    listen 80;
    server_name bratan-music.eu.cc;

    # Let's Encrypt HTTP-01 challenge (if ever needed)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Max upload size (for audio file uploads)
    client_max_body_size 50m;

    # API proxy
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $remote_addr;
    }

    # WebSocket for listening rooms
    location /api/rooms/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Webhook (Telegram) — no /api prefix rewrite
    location /webhook/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $remote_addr;
    }

    # Audio proxy — URLs returned by /api/tracks/:id/stream that the <audio>
    # element fetches directly (they include ?token= for auth). These paths
    # live outside the /api/ prefix so they need their own proxy rules.
    location /tracks/audio {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $remote_addr;
    }

    location ~ ^/tracks/[^/]+/override/stream {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $remote_addr;
    }

    # Frontend SPA (Vite build output)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Static assets — aggressive caching (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
