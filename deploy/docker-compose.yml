x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ── PostgreSQL (replaces D1) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bratan_music
      POSTGRES_USER: bratan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /opt/bratan-music/app/worker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bratan -d bratan_music"]
      interval: 5s
      retries: 10
    logging: *default-logging

  # ── Postgres backups (daily, retained 14 days) ────────
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: bratan_music
      POSTGRES_USER: bratan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z9 --clean --if-exists --no-owner --no-privileges"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "14"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - pgbackups:/backups
    healthcheck:
      test: ["CMD-SHELL", "/bin/sh /healthcheck.sh"]
      interval: 1m
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ── Redis (replaces KV) ───────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    logging: *default-logging

  # ── MinIO (replaces R2) ───────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10
    logging: *default-logging

  # ── API (bratan-music worker on Node.js) ──────────────
  api:
    image: ghcr.io/bratan-corp/bratan-music-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://bratan:${POSTGRES_PASSWORD}@postgres:5432/bratan_music"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: "tracks"
      DOMAIN: ${DOMAIN}
      APP_URL: "https://${DOMAIN}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      TIDAL_CLIENT_ID: ${TIDAL_CLIENT_ID:-}
      TIDAL_CLIENT_SECRET: ${TIDAL_CLIENT_SECRET:-}
      TIDAL_SESSION_TOKEN: ${TIDAL_SESSION_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-noreply.bratanmusic@gmail.com}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-BRATAN MUSIC}
      YANDEX_API_TOKEN: ${YANDEX_API_TOKEN:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_MODEL_URI: ${YANDEX_MODEL_URI:-}
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ── nginx (reverse proxy + static frontend) ───────────
  nginx:
    image: ghcr.io/bratan-corp/bratan-music-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
  miniodata:
  pgbackups:
