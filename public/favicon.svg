<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Adaptive accent — light theme uses the marketing accent (#5E6AD2),
    dark theme switches to the dark-mode accent (#7E89E8) so the icon
    pops against both system browser chromes. Mirrors the
    `--color-accent` token in src/styles/_tokens.scss byte-for-byte.

    Glyph is the BRATAN-CORP brand logo (B+play silhouette) supplied
    by the user, recentred to ~70% of the canvas with the iOS app-icon
    corner curve (14% radius). Always white against the accent tile so
    the wordmark reads in light, dark and home-screen contexts.
  -->
  <style>
    .bg { fill: #5E6AD2; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #7E89E8; }
    }
  </style>
