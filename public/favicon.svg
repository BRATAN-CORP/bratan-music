<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Real vector favicon. Mirrors `BrandLogo.tsx` geometry one-to-one
    (same 64x64 viewBox, same rounded-square radius, same play-
    triangle path, same wordmark) so the favicon, the in-app loader
    mark and the cold-start splash logo are visually identical.

    Static colours rather than `var(--color-accent)` because the
    browser tab/bookmark surfaces paint the favicon outside the
    document's CSS scope — CSS-variable references resolve to nothing
    there. The `prefers-color-scheme` media query inside the SVG is
    honoured by Chrome / Edge / Safari favicon renderers, so we still
    get a theme-adaptive tile (slightly cooler accent in dark mode to
    match the rest of the dark theme).

    Anything PWA-shaped — `apple-touch-icon`, the manifest 192/512
    icons, the home-screen tile — stays PNG (iOS rejects SVG for the
    home-screen mask, and the Android launcher needs raster maskable
    icons). The favicon is the ONLY place where SVG is correct.
  -->
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        #brand-logo-tile-stop-0 { stop-color: #6E7AE2; }
        #brand-logo-tile-stop-1 { stop-color: #5F6BD4; }
      }
    </style>
    <linearGradient id="brand-logo-tile" x1="0" y1="0" x2="1" y2="1">
      <stop id="brand-logo-tile-stop-0" offset="0%" stop-color="#5E6AD2" />
      <stop id="brand-logo-tile-stop-1" offset="100%" stop-color="#4f5bc4" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#brand-logo-tile)" />
  <path
    d="M22 19.5c0-1.1.9-2 2-2 .35 0 .69.09.99.27l16 9.5c1.34.79 1.34 2.67 0 3.46l-16 9.5c-.3.18-.64.27-.99.27-1.1 0-2-.9-2-2v-19z"
    fill="#ffffff"
  />
  <text
    x="32"
    y="56"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="0.5"
  >BRATAN</text>
</svg>
