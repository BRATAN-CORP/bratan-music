<?xml version="1.0" encoding="UTF-8"?>
<!--
    BRATAN MUSIC favicon — vector, theme-fixed.

    The user delivered the canonical brand mark as the white "B" glyph
    (a stylised B with a play arrow built into the counter). The rule
    attached to that delivery was unambiguous:

        "удали все другие вариации, используй строго акцентный цвет
         как фон. лого белый должен быть."

    So the favicon is:
        - solid accent fill (#5E6AD2, our `--color-accent` light token)
        - rounded-square plate (rx ≈ 22% of the side, the same iOS-app
          icon proportion the rest of the surfaces use)
        - white glyph centred inside, at the natural padding the
          designer baked into the source ("with borders" SVG, viewBox
          0 0 3000 3000)

    No light-/dark-mode media query and no `var(--color-accent)` —
    the user's instruction is the accent stays the accent, full stop.
    The browser tab does not inherit the document's CSS variables
    anyway, so a `var()` here would silently fall back to
    `currentColor` on most engines.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="64" height="64">
  <rect width="3000" height="3000" rx="657" fill="#5E6AD2"/>
  <path d="M2110.9,1507.6c-22.1-15.5-89.8-39.2-59.7-71.4,522.2-314.3,261.7-999-310-1027.2l-1050.5,2.5c-28.3,8.7-50.9,34.6-52.7,65l1.8,2031.3c16.2,62.8,93.5-34.2,108.5-54.4,37.4-50.5,60.9-110.6,69.5-173l.3-1589.2c3.8-47.8,30.2-87.8,78.9-97.7,294.9.5,590.7-5.6,885.1,3.1,372.1,65.7,498.3,479.6,171.6,710.7-13.6,9.6-81.3,47.3-84.4,54.1-1.4,2.9-2.1,5.3-2.1,8.6,0,6.9,24.7,44.8,29.7,57.2,14.6,35.9,19.4,73.6,15.6,112.5-1.3,13.3-13.5,40.6-8.8,50.2,62.2,34,121.7,68.2,169.9,121.2,146.9,161.4,138.4,401.6-13.4,556.4-79.1,80.6-202.4,136.8-315.5,143.4-221.7,12.9-457.5-13.5-679.1-.3-78.9,4.7-168.1,39.4-228.3,90.3-21.7,18.4-75.3,64.1-36.7,88.4,0,0,964.8,1.7,964.8,1.7,555.5-33.4,831.7-741.3,345.5-1083.4Z" fill="#fff"/>
